name: modern_app
description: AI assistant using shell commands.
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  google_generative_ai: any
  process_run: any
  speech_to_text: any
  flutter_tts: any
  permission_handler: any
  path_provider: any
  provider: any
  equatable: any
  flutter_foreground_task: any
  intl: any
  dash_bubble: 2.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: any

dependency_overrides:
  string_scanner: ^1.4.1
  term_glyph: ^1.2.2
  shared_preferences: 2.2.3
  speech_to_text: 6.6.0
  web: 0.4.2

flutter:
  uses-material-design: true
